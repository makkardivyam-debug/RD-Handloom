<!DOCTYPE html>

<html>

<head>

<title>Bedsheets</title>

<style>

body{font-family:Arial;background:#f5f5f5;margin:0;padding:20px;}

.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}

.card{background:white;padding:10px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,.1);text-align:center;}

.card img{width:100%;height:300px;object-fit:cover;border-radius:10px;cursor:pointer;}

.price{color:#e91e63;font-size:22px;font-weight:bold;}

  </style>

</head>

<body>

<h1>RD Handloom Bedsheets</h1>

<div class="products">

<div class="card">

<img src="images/bedsheet1.jpg" onclick="window.open(this.src)">

<h3>Bajaj Double Bed 1+2</h3>

<p>Brand: Bajaj</p>

<p>Quality: Premium Cotton</p>

<p class="price">₹1299</p>

</div>

<div class="card">

<img src="images/bedsheet2.jpg" onclick="window.open(this.src)">

<h3>Floral Bedsheet</h3>

<p>Brand: RD Collection</p>

<p>Quality: Soft Cotton</p>

<p class="price">₹999</p>

</div>

</div>

</body>

</html>
