<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RD Handloom Bedsheets</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
}

header{
background:#ff9800;
color:white;
text-align:center;
padding:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:30px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,.15);
}

.card img{
width:100%;
height:300px;
object-fit:cover;
}

.info{
padding:15px;
}

.price{
color:#e91e63;
font-size:22px;
font-weight:bold;
}
</style>
</head>

<body>

<header>
<h1>RD Handloom Bedsheets Collection</h1>
</header>

<div class="products">

<div class="card">
<img src="images/bedsheet1.jpg">
<div class="info">
<h2>Bajaj Double Bed 1+2</h2>
<p><b>Brand:</b> Bajaj</p>
<p><b>Quality:</b> Premium Cotton</p>
<p><b>Size:</b> Double Bed</p>
<p class="price">₹1299</p>
</div>
</div>

<div class="card">
<img src="images/bedsheet2.jpg">
<div class="info">
<h2>Floral Bedsheet</h2>
<p><b>Brand:</b> RD Collection</p>
<p><b>Quality:</b> Soft Cotton</p>
<p><b>Size:</b> King Size</p>
<p class="price">₹999</p>
</div>
</div>

<div class="card">
<img src="images/bedsheet3.jpg">
<div class="info">
<h2>Luxury Printed Bedsheet</h2>
<p><b>Brand:</b> Premium Home</p>
<p><b>Quality:</b> Export Quality</p>
<p><b>Size:</b> Double Bed</p>
<p class="price">₹1499</p>
</div>
</div>

</div>

</body>
</html>
